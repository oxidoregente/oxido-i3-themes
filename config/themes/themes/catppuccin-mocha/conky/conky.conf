conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 0,
    cpu_avg_samples = 2,
    default_color = '#cdd6f4',
    double_buffer = true,
    font = 'JetBrainsMono Nerd Font Mono:size=16',
    gap_x = 40,
    gap_y = 60,
    minimum_width = 380,
    maximum_width = 380,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    update_interval = 1.0,
    uppercase = false,
    use_xft = true,
    color0 = '#89b4fa',
    color1 = '#f5c2e7',
    color2 = '#89dceb',
    color3 = '#a6e3a1',
    color4 = '#f9e2af',
};

conky.text = [[
${color0}${font JetBrainsMono Nerd Font Mono:size=64}${alignc}${time %I:%M}${font}
${color2}${font JetBrainsMono Nerd Font Mono:size=18}${alignc}${time %A, %d %B}${font}
${color1}${hr 2}

${color2}  SISTEMA  ${color}${alignr}${nodename}
${color2}  UPTIME   ${color}${alignr}${uptime}
${color2}  KERNEL   ${color}${alignr}${kernel}

${color2}  CPU ${color}${alignr}${cpu cpu0}% @ ${freq_g}GHz
${color0}${cpugraph cpu0 60,380 #585b70 #89b4fa -t}
${color2}  TEMP ${color}${alignr}${execi 5 sensors | grep 'Package id' | awk '{print $4}'}

${color2}  RAM ${color}${alignr}${mem} / ${memmax} (${memperc}%)
${color0}${membar 12,380}

${color2}  NVMe ${color}${alignr}${fs_used /} / ${fs_size /}
${color0}${fs_bar 12,380 /}
]]
