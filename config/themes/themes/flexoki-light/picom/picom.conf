backend = "glx";
vsync = true;

corner-radius = 12;
round-borders = 1;
detect-rounded-corners = true;

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;

blur-method = "dual_kawase";
blur-strength = 5;

animations = ({
    triggers = ["open"];
    preset = "appear";
    scale = 0.92;
    duration = 0.22;
}, {
    triggers = ["close"];
    preset = "fly-out";
    direction = "down";
    duration = 0.25;
}, {
    triggers = ["show"];
    preset = "fly-in";
    direction = "up";
    duration = 0.2;
}, {
    triggers = ["hide"];
    preset = "fly-out";
    direction = "down";
    duration = 0.15;
}, {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.25;
});

rules: ({
    match = "focused = false";
    opacity = 0.90;
}, {
    match = "window_type = 'dock' || window_type = 'desktop'";
    corner-radius = 0;
}, {
    match = "class_g = 'Polybar' || class_g = 'polybar'";
    shadow = false;
    corner-radius = 0;
}, {
    match = "name = 'Notification' || class_g ?= 'Notify-osd'";
    shadow = false;
}, {
    match = "_GTK_FRAME_EXTENTS";
    shadow = false;
}, {
    # Alacritty: fast open/close
    match = "class_g = 'Alacritty'";
    animations = ({
        triggers = ["open"];
        preset = "appear";
        scale = 0.90;
        duration = 0.15;
    }, {
        triggers = ["close"];
        preset = "fly-out";
        direction = "down";
        duration = 0.15;
    });
}, {
    # Firefox: slide from bottom
    match = "class_g = 'Firefox' || class_g = 'firefox'";
    animations = ({
        triggers = ["open"];
        preset = "fly-in";
        direction = "up";
        duration = 0.25;
    }, {
        triggers = ["close"];
        preset = "fly-out";
        direction = "down";
        duration = 0.2;
    });
}, {
    # Rofi: snappy
    match = "class_g = 'rofi'";
    animations = ({
        triggers = ["open", "show"];
        preset = "appear";
        scale = 0.95;
        duration = 0.12;
    }, {
        triggers = ["close", "hide"];
        preset = "disappear";
        scale = 1.05;
        duration = 0.08;
    });
}, {
    # Dunst: slide from right
    match = "class_g = 'Dunst'";
    animations = ({
        triggers = ["open", "show"];
        preset = "slide-in";
        direction = "right";
        duration = 0.2;
    }, {
        triggers = ["close", "hide"];
        preset = "slide-out";
        direction = "right";
        duration = 0.15;
    });
});
