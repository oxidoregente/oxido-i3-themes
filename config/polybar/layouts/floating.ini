[bar/top]
# Estilo Floating Masterizado
width = 90%
height = 32
radius = 16
dpi = 96
offset-x = 5%
offset-y = 1%

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 0
border-size = 2
border-color = ${colors.primary}

padding-left = 0
padding-right = 0
module-margin = 0
separator = ""

font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=13;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"

cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-position = none

modules-left = float-start xworkspaces float-end
modules-center = center-start date center-end
modules-right = sys-start dnd network-info cpu pulseaudio battery powermenu tray sys-end

# в”Ђв”Ђв”Ђ Floating Caps в”Ђв”Ђв”Ђ

[module/float-start]
type = custom/text
format = <label>
label = " о‚¶"
label-foreground = ${colors.background-alt}

[module/float-end]
type = custom/text
format = <label>
label = "о‚ґ"
label-foreground = ${colors.background-alt}

[module/center-start]
type = custom/text
format = <label>
label = "о‚¶"
label-foreground = ${colors.background-alt}

[module/center-end]
type = custom/text
format = <label>
label = "о‚ґ"
label-foreground = ${colors.background-alt}

[module/sys-start]
type = custom/text
format = <label>
label = " о‚¶"
label-foreground = ${colors.background-alt}

[module/sys-end]
type = custom/text
format = <label>
label = "о‚ґ"
label-foreground = ${colors.background-alt}

# в”Ђв”Ђв”Ђ Modules в”Ђв”Ђв”Ђ

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.background-alt}
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-active-radius = 12
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/date]
type = internal/date
interval = 1
format-background = ${colors.background-alt}
format-padding = 1
format-prefix = "п‰ґ "
format-prefix-foreground = ${colors.primary}
date = %I:%M %p
label = %date%
label-foreground = ${colors.foreground}

[module/network-info]
type = internal/network
interface-type = wireless
interval = 5
format-connected-background = ${colors.background-alt}
format-connected-padding = 1
label-connected = "п‡« %essid%"
label-connected-foreground = ${colors.primary}
format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.background-alt}
format-disconnected-padding = 1
label-disconnected = "у°–Є OFF"
label-disconnected-foreground = ${colors.disabled}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-background = ${colors.background-alt}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-background = ${colors.background-alt}
format-padding = 1
format-prefix = "п‹› "
format-prefix-foreground = ${colors.green}
label = %percentage%%

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume-background = ${colors.background-alt}
format-volume-padding = 1
label-volume = "пЂЁ %percentage%%"
label-volume-foreground = ${colors.primary}
format-muted-background = ${colors.background-alt}
format-muted-padding = 1
label-muted = "у°ќџ MUTE"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-background = ${colors.background-alt}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-battery-info.sh
click-right = /home/oxido/.config/themes/scripts/rofi-battery-mode.sh

[module/powermenu]
type = custom/text
format = "%{T2}пЂ‘%{T-}"
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 1
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
format-background = ${colors.background-alt}
tray-spacing = 8
tray-size = 65%
tray-background = ${colors.background-alt}

# в”Ђв”Ђв”Ђ Barra Reproductor: Aparece solo con fuente de audio activa в”Ђв”Ђв”Ђ

[bar/player]
inherit = bar/top
background = ${colors.background-alt}
border-size = 0
line-size = 0
width = 16%
offset-x = 58%
override-redirect = true
enable-ipc = true
modules-left = player-start
modules-center = nowplaying
modules-right = player-end

[module/player-start]
type = custom/text
format = <label>
label = "о‚¶"
label-foreground = ${colors.primary}

[module/player-end]
type = custom/text
format = <label>
label = "о‚ґ"
label-foreground = ${colors.primary}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = ~/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = ~/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
