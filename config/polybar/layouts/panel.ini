[bar/top]
width = 100%
height = 28
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 1pt
padding-left = 2
padding-right = 2
module-margin = 2
separator = "  "
font-0 = "JetBrainsMono Nerd Font Mono:size=12;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=11;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=20;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background}

modules-left = xworkspaces panel-sep
modules-center = date
modules-right = panel-sep dnd panel-sep cpu panel-sep memory panel-sep pulseaudio panel-sep battery tray panel-sep powermenu

[module/panel-sep]
type = custom/text
content = "|"
content-foreground = ${colors.disabled}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %d-%m-%Y %I:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
label = " %percentage%%"
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 3
label = " %percentage_used%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = " %percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 8
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " 婢 MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/powermenu]
type = custom/text
content = ""
content-foreground = ${colors.alert}
click-left = /home/oxido/.config/themes/scripts/power-menu.sh

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.background}
