# oxido-i3-themes — Layout: Bubble (Split Bars)
# Cada barra es una burbuja independiente con su propio color de fondo y
# bordes redondeados (radius=6). Sin módulos start/end — la barra misma
# es el contenedor burbuja.
#
# Split bar design inspirado en arkzuse/polybar-theme
# https://github.com/arkzuse/polybar-theme — MIT License

# ─── Barra Izquierda: Workspaces ───

[bar/left]
width = 26%
offset-x = 0%
height = 34
radius = 6
dpi = 96
background = ${colors.bubble-ws}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 4
padding-right = 4
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
override-redirect = true

modules-left = xworkspaces
modules-center =
modules-right =

# ─── Barra Central: Fecha ───

[bar/center]
width = 22%
offset-x = 26%
height = 34
radius = 6
dpi = 96
background = ${colors.bubble-center}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 4
padding-right = 4
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
override-redirect = true

modules-left =
modules-center = date
modules-right =

# ─── Barra Reproductor: Aparece solo con fuente de audio activa ───

[bar/player]
width = 20%
offset-x = 48%
height = 34
radius = 6
dpi = 96
background = ${colors.bubble-player}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 4
padding-right = 4
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
override-redirect = true

modules-left =
modules-center = nowplaying
modules-right =

# ─── Barra Derecha: Sistema + Bandeja ───

[bar/right]
width = 32%
offset-x = 68%
height = 34
radius = 6
dpi = 96
background = ${colors.bubble-sys}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 4
padding-right = 4
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
override-redirect = true

modules-left =
modules-center =
modules-right = dnd network-info cpu cpu-temp memory pulseaudio battery tray powermenu

# ─── Módulo Now Playing (tail mode) ───

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = playerctl play-pause
click-right = playerctl next
format = <label>
format-padding = 1
label = %output%
label-foreground = ${colors.primary}

# ─── Módulos ───

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/date-wrapper.sh
interval = 1
click-left = ~/.config/polybar/scripts/date-toggle.sh
format = <label>
format-padding = 1
label = %output%
label-foreground = ${colors.primary}

[module/network-info]
type = internal/network
interface-type = wireless
interval = 5
format-connected-padding = 1
format-connected = <label-connected>
label-connected = " %essid%"
label-connected-foreground = ${colors.foreground}
format-disconnected-padding = 1
label-disconnected = "󰖪 OFF"
label-disconnected-foreground = ${colors.disabled}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-padding = 1
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = "%percentage%%"
label-foreground = ${colors.foreground}

[module/cpu-temp]
type = custom/script
exec = /home/oxido/.config/themes/scripts/cputemp-widget.sh
interval = 10
signal = 15
format-padding = 1

[module/memory]
type = internal/memory
interval = 3
format-padding = 1
format-prefix = " "
format-prefix-foreground = ${colors.pink}
label = "%percentage_used%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume-padding = 1
format-volume = <label-volume>
label-volume = "%{T2}%{T-} %percentage%%"
label-volume-foreground = ${colors.foreground}
format-muted-padding = 1
label-muted = "%{T2}󰝟%{T-} MUTE"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-battery-info.sh
click-right = /home/oxido/.config/themes/scripts/rofi-battery-mode.sh

[module/powermenu]
type = custom/text
format = " %{T2}%{T-}"
format-foreground = ${colors.alert}
format-padding = 1
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-size = 65%
