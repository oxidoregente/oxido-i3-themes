[bar/top]
# Estilo Bubble Masterizado v2
width = 100%
height = 34
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 2
padding-right = 2
module-margin = 0
separator = ""

font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"

cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-position = none

modules-left = ws-start xworkspaces ws-end
modules-center = center-start date center-end
modules-right = sys-start dnd network-info cpu cpu-temp memory pulseaudio battery tray sys-end powermenu

# в”Ђв”Ђв”Ђ Bubble Caps в”Ђв”Ђв”Ђ

[module/ws-start]
type = custom/text
format = <label>
label = "о‚¶"
label-foreground = ${colors.bubble-ws}
label-background = ${colors.background}

[module/ws-end]
type = custom/text
format = <label>
label = "о‚ґ "
label-foreground = ${colors.bubble-ws}
label-background = ${colors.background}

[module/center-start]
type = custom/text
format = <label>
label = "о‚¶"
label-foreground = ${colors.bubble-center}
label-background = ${colors.background}

[module/center-end]
type = custom/text
format = <label>
label = "о‚ґ"
label-foreground = ${colors.bubble-center}
label-background = ${colors.background}

[module/sys-start]
type = custom/text
format = <label>
label = " о‚¶"
label-foreground = ${colors.bubble-sys}
label-background = ${colors.background}

[module/sys-end]
type = custom/text
format = <label>
label = "о‚ґ"
label-foreground = ${colors.bubble-sys}
label-background = ${colors.background}

# в”Ђв”Ђв”Ђ Modules в”Ђв”Ђв”Ђ

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.bubble-ws}
label-active = %name%
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.bubble-ws}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-background = ${colors.bubble-ws}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-background = ${colors.bubble-ws}
label-empty-padding = 1

[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/date-wrapper.sh
interval = 1
click-left = ~/.config/polybar/scripts/date-toggle.sh
format = <label>
format-background = ${colors.bubble-center}
format-padding = 1
label = %output%
label-foreground = ${colors.primary}

[module/network-info]
# Muestra solo el nombre de la red
type = internal/network
interface-type = wireless
interval = 5
format-connected-background = ${colors.bubble-sys}
format-connected-padding = 1
format-connected = <label-connected>
label-connected = "п‡« %essid%"
label-connected-foreground = ${colors.primary}
format-disconnected = <label-disconnected>
format-disconnected-background = ${colors.bubble-sys}
format-disconnected-padding = 1
label-disconnected = "у°–Є OFF"
label-disconnected-foreground = ${colors.disabled}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-background = ${colors.bubble-sys}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-background = ${colors.bubble-sys}
format-padding = 1
format-prefix = "п‹› "
format-prefix-foreground = ${colors.green}
label = "%percentage%%"

[module/cpu-temp]
type = custom/script
exec = /home/oxido/.config/themes/scripts/cputemp-widget.sh
interval = 10
signal = 15
format-background = ${colors.bubble-sys}
format-padding = 1

[module/memory]
type = internal/memory
interval = 3
format-background = ${colors.bubble-sys}
format-padding = 1
format-prefix = "пѓ‰ "
format-prefix-foreground = ${colors.pink}
label = "%percentage_used%%"

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume-background = ${colors.bubble-sys}
format-volume-padding = 1
format-volume = <label-volume>
label-volume = "%{T2}пЂЁ%{T-} %percentage%%"
label-volume-foreground = ${colors.primary}
format-muted-background = ${colors.bubble-sys}
format-muted-padding = 1
label-muted = "%{T2}у°ќџ%{T-} MUTE"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 10
# ActualizaciГіn inmediata con seГ±al 10 (RTMIN+10)
signal = 10
format-background = ${colors.bubble-sys}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-battery-info.sh
click-right = /home/oxido/.config/themes/scripts/rofi-battery-mode.sh

[module/powermenu]
type = custom/text
format = " %{T2}пЂ‘%{T-}"
format-foreground = ${colors.alert}
format-background = ${colors.bubble-sys}
format-padding = 1
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
format-background = ${colors.bubble-sys}
tray-spacing = 8
tray-size = 65%
tray-background = ${colors.bubble-sys}
