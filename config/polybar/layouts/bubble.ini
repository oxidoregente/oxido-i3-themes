[bar/top]
width = 100%
height = 34
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 2
padding-right = 2
module-margin = 1
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=14;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=24;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = ws-pad xworkspaces ws-pad
modules-center = mid-pad date mid-pad
modules-right = sys-pad dnd cpu temperature memory cava pulseaudio battery tray powermenu sys-pad

[module/ws-pad]
type = custom/text
format = <label>
label = " "
label-background = ${colors.bubble-ws}
label-foreground = ${colors.bubble-ws}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.bubble-ws}
label-active = %name%
label-active-foreground = ${colors.background}
label-active-background = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.bubble-ws}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-background = ${colors.bubble-ws}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-background = ${colors.bubble-ws}
label-empty-padding = 1

[module/mid-pad]
type = custom/text
format = <label>
label = " "
label-background = ${colors.bubble-center}
label-foreground = ${colors.bubble-center}

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %d-%m-%Y %I:%M:%S %p
format-background = ${colors.bubble-center}
format-padding = 2
label = %date%
label-foreground = ${colors.primary}

[module/sys-pad]
type = custom/text
format = <label>
label = " "
label-background = ${colors.bubble-sys}
label-foreground = ${colors.bubble-sys}
[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-background = ${colors.bubble-sys}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh
[module/cpu]
type = internal/cpu
interval = 3
format-background = ${colors.bubble-sys}
format-padding = 1
label = " %percentage%%"
label-foreground = ${colors.foreground}

[module/temperature]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70
format = <label>
format-warn = <label-warn>
format-background = ${colors.bubble-sys}
format-padding = 1
format-warn-background = ${colors.alert}
format-warn-padding = 1
label = "  %temperature-c%"
label-warn = "  %temperature-c%"
label-warn-foreground = ${colors.foreground}
label-warn-background = ${colors.alert}

[module/memory]
type = internal/memory
interval = 3
format-background = ${colors.bubble-sys}
format-padding = 1
label = "  %percentage_used%%"
label-foreground = ${colors.foreground}

[module/cava]
type = custom/script
exec = /home/oxido/.config/themes/scripts/cava-polybar.sh
tail = true
format-background = ${colors.bubble-sys}
format-padding = 1
label = %output%
format-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-background = ${colors.bubble-sys}
format-volume-padding = 1
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-background = ${colors.bubble-sys}
format-muted-padding = 1
format-muted-foreground = ${colors.alert}
label-volume = "%{T2}%{T-} %percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 10
bar-volume-gradient = false
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " 婢 MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/network]
type = internal/network
interface-type = wireless
interval = 3.0

format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>

label-connected = %essid%
label-disconnected = Desconectado
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

click-right = nm-connection-editor

[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.bubble-sys}
format-padding = 2
click-left = /home/oxido/.config/eww/scripts/toggle-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.bubble-sys}
