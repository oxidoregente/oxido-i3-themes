[bar/top]
width = 100%
height = 22
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator = ""
font-0 = "IosevkaTerm Nerd Font Mono:size=9;3"
font-1 = "IosevkaTerm Nerd Font Mono:size=10;4"
font-2 = "IosevkaTerm Nerd Font Mono:size=14;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = xworkspaces
modules-center = date
modules-right = nowplaying memory pulseaudio battery tray powermenu
; Available: battery cpu cpu-temp dnd memory network-info nowplaying powermenu pulseaudio tray

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.empty-ws}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 120
label = "RAM %percentage_used%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
label-muted = "MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh next
  format = <label>
  format-padding = 1
  label = %output%
  label-foreground = ${colors.foreground}

; --- Hidden modules (available via Module Manager) ---
[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh
format-padding = 1

[module/network-info]
type = internal/network
interface-type = wireless
interval = 5
format-connected-padding = 1
label-connected = " %essid%"
format-disconnected = <label-disconnected>
format-disconnected-padding = 1
label-disconnected = "󰅪 OFF"
label-disconnected-foreground = ${colors.disabled}
format-padding = 1

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = "%percentage%%"
format-padding = 1

[module/cpu-temp]
type = internal/temperature
thermal-zone = 0
warn-temperature = 70
format = <label>
format-warn = <label-warn>
format-warn-padding = 1
label = "  %temperature-c%"
label-warn = "  %temperature-c%"
label-warn-foreground = ${colors.foreground}
format-padding = 1

