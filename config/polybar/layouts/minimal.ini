[bar/top]
width = 100%
height = 22
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator = ""
font-0 = "IosevkaTerm Nerd Font Mono:size=9;3"
font-1 = "IosevkaTerm Nerd Font Mono:size=10;4"
font-2 = "IosevkaTerm Nerd Font Mono:size=14;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background}

modules-left = xworkspaces
modules-center = date
modules-right = memory pulseaudio battery tray

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 120
label = "RAM %percentage_used%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
label-muted = "MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 60
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/tray]
type = internal/tray
tray-spacing = 2
tray-background = ${colors.background}
