[bar/top]
width = 100%
height = 22
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 1
padding-right = 1
module-margin = 1
separator = ""
font-0 = "IosevkaTerm Nerd Font Mono:size=9;3"
font-1 = "IosevkaTerm Nerd Font Mono:size=10;4"
font-2 = "IosevkaTerm Nerd Font Mono:size=14;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = xworkspaces
modules-center = date
modules-right = memory pulseaudio battery tray powermenu

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.primary}

[module/memory]
type = internal/memory
interval = 120
label = "RAM %percentage_used%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
label-muted = "MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background}

# ─── Barra Reproductor: Aparece solo con fuente de audio activa ───

[bar/player]
inherit = bar/top
background = ${colors.background-alt}
border-size = 0
line-size = 0
width = 16%
offset-x = 58%
override-redirect = true
enable-ipc = true
modules-left = player-start
modules-center = nowplaying
modules-right = player-end

[module/player-start]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}

[module/player-end]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = ~/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = ~/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
