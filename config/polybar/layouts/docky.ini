[bar/top]
width = 96%
height = 32
radius = 16
dpi = 96
offset-x = 2%
background = ${colors.background-alt}
foreground = ${colors.foreground}
line-size = 0
padding-left = 2
padding-right = 2
module-margin = 1
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=13;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=16;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = docky-launcher
modules-center = xworkspaces
modules-right = date pulseaudio battery tray powermenu

[module/docky-launcher]
type = custom/text
format = <label>
format-foreground = ${colors.primary}
label = ""
label-padding = 2
click-left = ~/.config/themes/scripts/launch-browser.sh

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = %name%
label-empty-padding = 2
label-empty-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
date = %I:%M %p
date-alt = %a %d-%m-%Y
format-padding = 2
label = %date%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 6
bar-volume-gradient = false
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = "MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background}

# ─── Barra Reproductor: Aparece solo con fuente de audio activa ───

[bar/player]
inherit = bar/top
transparent = false
background = ${colors.background}
border-size = 0
line-size = 0
width = 16%
offset-x = 58%
override-redirect = true
enable-ipc = true
modules-left = player-start nowplaying player-end
modules-center = 
modules-right = 

[module/player-start]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}
label-background = ${colors.background}

[module/player-end]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}
label-background = ${colors.background}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = ~/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = ~/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
format-background = ${colors.background}
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
