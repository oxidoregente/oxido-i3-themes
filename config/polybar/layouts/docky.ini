[bar/top]
width = 96%
height = 32
radius = 16
dpi = 96
offset-x = 2%
background = ${colors.background-alt}
foreground = ${colors.foreground}
line-size = 0
padding-left = 4
padding-right = 4
module-margin = 2
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=13;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=16;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background-alt}

modules-left = docky-launcher
modules-center = xworkspaces
modules-right = date pulseaudio battery tray

[module/docky-launcher]
type = custom/text
format = <label>
format-foreground = ${colors.primary}
label = ""
label-padding = 2
click-left = ~/.config/themes/scripts/launch-browser.sh

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = %name%
label-empty-padding = 2
label-empty-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %a %d-%m-%Y
format-padding = 2
label = %date%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = "%{T1}%{T-} %percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 6
bar-volume-gradient = false
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " 婢 MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
format = <label>
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/tray]
type = internal/tray
tray-spacing = 6
tray-background = ${colors.background-alt}
