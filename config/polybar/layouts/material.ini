[bar/top]
# Estilo Material Masterizado
width = 100%
height = 36
radius = 0
dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = ${colors.primary}

border-bottom-size = 3
border-bottom-color = ${colors.primary}

padding-left = 0
padding-right = 0
module-margin = 0
separator = ""

font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=13;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"

cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = mat-ws-start xworkspaces mat-ws-end
modules-center = mat-center-start date mat-center-end
modules-right = mat-sys-start dnd network-info cpu pulseaudio battery tray powermenu mat-sys-end

# ─── Material Caps ───

[module/mat-ws-start]
type = custom/text
format = <label>
label = "  "
label-background = ${colors.background-alt}

[module/mat-ws-end]
type = custom/text
format = <label>
label = "  "
label-background = ${colors.background-alt}

[module/mat-center-start]
type = custom/text
format = <label>
label = "  "
label-background = ${colors.background-alt}

[module/mat-center-end]
type = custom/text
format = <label>
label = "  "
label-background = ${colors.background-alt}

[module/mat-sys-start]
type = custom/text
format = <label>
label = "  "
label-background = ${colors.background-alt}

[module/mat-sys-end]
type = custom/text
format = <label>
label = "  "
label-background = ${colors.background-alt}

# ─── Modules ───

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.background-alt}
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 2
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = %name%
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/date]
type = internal/date
interval = 1
format-background = ${colors.background-alt}
format-padding = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
date = %I:%M %p
date-alt = %A, %d %B %Y
label = %date%
label-foreground = ${colors.foreground}

[module/network-info]
type = internal/network
interface-type = wireless
interval = 5
format-connected-background = ${colors.background-alt}
format-connected-padding = 1
label-connected = " %essid%"
label-connected-foreground = ${colors.primary}
format-disconnected-background = ${colors.background-alt}
format-disconnected-padding = 1
label-disconnected = "󰖪 OFF"
label-disconnected-foreground = ${colors.disabled}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-background = ${colors.background-alt}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-background = ${colors.background-alt}
format-padding = 1
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage%%

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume-background = ${colors.background-alt}
format-volume-padding = 1
label-volume = " %percentage%%"
label-volume-foreground = ${colors.primary}
format-muted-background = ${colors.background-alt}
format-muted-padding = 1
label-muted = "󰝟 MUTE"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 10
signal = 10
format-background = ${colors.background-alt}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh

[module/powermenu]
type = custom/text
format = " %{T2}%{T-}"
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 1
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
format-background = ${colors.background-alt}
tray-spacing = 8
tray-size = 65%
tray-background = ${colors.background-alt}
