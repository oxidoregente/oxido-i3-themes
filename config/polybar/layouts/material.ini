[bar/top]
width = 100%
height = 36
radius = 14
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2
line-color = ${colors.primary}
border-size = 3
border-color = ${colors.primary}
padding-left = 8
padding-right = 8
module-margin = 4
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=14;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=16;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=24;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background}

modules-left = xworkspaces
modules-center = date
modules-right = dnd cpu pulseaudio battery tray

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 3
label-active-radius = 8
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 3
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 3
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 3

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-padding = 2
date = %I:%M %p
date-alt = %A, %d %B %Y
label = %date%
label-foreground = ${colors.foreground}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-padding = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
format-padding = 2
label = %percentage%%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume-foreground = ${colors.primary}
label-volume = "%percentage%%"
bar-volume-width = 10
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
format-padding = 2
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/tray]
type = internal/tray
tray-spacing = 8
tray-size = 20
tray-background = ${colors.background}
