[bar/top]
width = 92%
height = 24
radius = 18
dpi = 96
offset-x = 4%
background = ${colors.background-alt}
foreground = ${colors.foreground}
line-size = 0
padding-left = 2
padding-right = 2
module-margin = 1
separator = ""
font-0 = "Maple Mono NF:style=Bold:size=10;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "Maple Mono NF:style=Bold:size=16;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background-alt}

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio battery tray

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1
label-active-radius = 12
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
date = %I:%M
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume-foreground = ${colors.primary}
label-volume = "%percentage%%"
bar-volume-width = 4
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.background}
label-muted = " MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/tray]
type = internal/tray
tray-spacing = 4
tray-size = 14
tray-background = ${colors.background-alt}
