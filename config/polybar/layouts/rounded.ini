[bar/top]
width = 100%
height = 24
radius = 18
dpi = 96
transparent = false
background = ${colors.background-alt}
foreground = ${colors.foreground}
line-size = 0
padding-left = 2
padding-right = 2
module-margin = 1
separator = ""
font-0 = "Maple Mono NF:style=Bold:size=10;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=12;4"
font-2 = "Maple Mono NF:style=Bold:size=16;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = xworkspaces
modules-center = date
modules-right = nowplaying pulseaudio battery tray powermenu

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-foreground = ${colors.primary}
label-active-padding = 1
label-active-radius = 12
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.empty-ws}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
date = %I:%M
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume-foreground = ${colors.primary}
label-volume = "%percentage%%"
bar-volume-width = 4
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.background}
label-muted = " MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-size = 14

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
label-background = ${colors.background-alt}
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
