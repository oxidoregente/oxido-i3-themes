[bar/top]
width = 100%
height = 30
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=13;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=11;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=22;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background}

modules-left = sharp-start xworkspaces sharp-end
modules-center = date
modules-right = dnd cpu pulseaudio battery tray

[module/sharp-start]
type = custom/text
content = ""
content-foreground = ${colors.background}
content-background = ${colors.primary}

[module/sharp-end]
type = custom/text
content = ""
content-foreground = ${colors.background}
content-background = ${colors.primary}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %d-%m-%Y %I:%M:%S %p
format-padding = 2
label = %date%
label-foreground = ${colors.primary}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-padding = 1
label = " %percentage%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = " %percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 8
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " 婢 MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.background}
