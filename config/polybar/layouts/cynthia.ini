[bar/top]
width = 100%
height = 28
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 1
separator = ""
font-0 = "Maple Mono NF:style=Bold:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=14;4"
font-2 = "Maple Mono NF:style=Bold:size=18;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background}

modules-left = cynthia-ws-start xworkspaces cynthia-ws-end
modules-center = cynthia-center-start date cynthia-center-end
modules-right = dnd cpu pulseaudio battery tray

[module/cynthia-ws-start]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}
label-background = ${colors.background}

[module/cynthia-ws-end]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}
label-background = ${colors.background}

[module/cynthia-center-start]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.background-alt}
label-background = ${colors.background}

[module/cynthia-center-end]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.background-alt}
label-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.primary}
format-padding = 1
label-active = " %name% "
label-active-foreground = ${colors.background}
label-active-padding = 1
label-occupied = " %name% "
label-occupied-foreground = ${colors.background}
label-occupied-padding = 1
label-urgent = " %name% "
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = " %name% "
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
format-background = ${colors.background-alt}
format-padding = 2
date = %I:%M %p
date-alt = %d-%m-%Y %I:%M:%S %p
label = %date%
label-foreground = ${colors.primary}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
format-padding = 1
label = "%percentage%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 6
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = "MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.background}
