[bar/top]
width = 100%
height = 28
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 1
separator = ""
font-0 = "IosevkaTerm Nerd Font Mono:size=11;3"
font-1 = "IosevkaTerm Nerd Font Mono:size=12;4"
font-2 = "IosevkaTerm Nerd Font Mono:size=18;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = xworkspaces
modules-center = date
modules-right = dnd cpu memory pulseaudio battery tray powermenu

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.background-alt}
format-padding = 1
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-background = ${colors.background-alt}
format-padding = 2
date = %I:%M %p
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.foreground}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-padding = 2
format-background = ${colors.background-alt}
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
format-background = ${colors.background-alt}
format-padding = 2
label = %percentage%%
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
format-background = ${colors.background-alt}
format-padding = 2
label = %percentage_used%%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-volume-background = ${colors.background-alt}
format-volume-padding = 2
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
format-muted-background = ${colors.background-alt}
label-volume-foreground = ${colors.primary}
label-volume = "%percentage%%"
bar-volume-width = 6
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background}

# ─── Barra Reproductor: Aparece solo con fuente de audio activa ───

[bar/player]
inherit = bar/top
background = ${colors.background-alt}
border-size = 0
line-size = 0
width = 16%
offset-x = 58%
override-redirect = true
enable-ipc = true
modules-left = player-start
modules-center = nowplaying
modules-right = player-end

[module/player-start]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}

[module/player-end]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = ~/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = ~/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
