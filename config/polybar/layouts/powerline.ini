[bar/top]
width = 100%
height = 30
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 1
separator = ""
font-0 = "IosevkaTerm Nerd Font Mono:size=11;3"
font-1 = "IosevkaTerm Nerd Font Mono:size=12;4"
font-2 = "IosevkaTerm Nerd Font Mono:size=18;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = powerline-ws-start xworkspaces powerline-ws-end
modules-center = date
modules-right = nowplaying cpu memory pulseaudio battery tray powermenu

[module/powerline-ws-start]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}
label-background = ${colors.background}

[module/powerline-ws-end]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.primary}
label-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-background = ${colors.primary}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
date = %I:%M %p
date-alt = %d-%m-%Y %I:%M:%S %p
format-padding = 2
label = %date%
label-foreground = ${colors.foreground}
format-background = ${colors.background-alt}

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
format-padding = 1
label = "%percentage%%"
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
format-padding = 1
label = "%percentage_used%%"
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
format-muted-padding = 1
label-volume = "%percentage%%"
label-volume-foreground = ${colors.primary}
bar-volume-width = 6
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = "MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
format-background = ${colors.background-alt}
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
