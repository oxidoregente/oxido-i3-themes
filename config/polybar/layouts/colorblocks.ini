[bar/top]
width = 100%
height = 28
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=13;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=18;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background-alt}

modules-left = xworkspaces colorblocks-sep cpu colorblocks-sep memory
modules-center = date
modules-right = pulseaudio colorblocks-sep battery colorblocks-sep powermenu colorblocks-sep tray

[module/colorblocks-sep]
type = custom/text
format = <label>
label = " "
label-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.primary}
label-active = " %name% "
label-active-foreground = ${colors.background}
label-active-padding = 2
label-occupied = " %name% "
label-occupied-foreground = ${colors.background}
label-occupied-padding = 2
label-urgent = " %name% "
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = " %name% "
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/cpu]
type = internal/cpu
interval = 3
format-background = ${colors.green}
format-padding = 2
label = "  %percentage%% "
label-foreground = ${colors.background}

[module/memory]
type = internal/memory
interval = 3
format-background = ${colors.yellow}
format-padding = 2
label = "  %percentage_used%% "
label-foreground = ${colors.background}

[module/date]
type = internal/date
interval = 1
format-background = ${colors.secondary}
format-padding = 3
date = %I:%M %p
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.background}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.background}
format-volume-background = ${colors.pink}
format-volume-padding = 2
format-muted = <label-muted>
format-muted-foreground = ${colors.background}
format-muted-background = ${colors.alert}
format-muted-padding = 2
label-volume = "  %percentage%% "
label-volume-foreground = ${colors.background}
label-muted = " 婢 MUTED "
label-muted-foreground = ${colors.background}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
format-background = ${colors.primary}
format-padding = 2
label = " %output% "
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/powermenu]
type = custom/text
format = "  "
format-foreground = ${colors.background}
format-background = ${colors.alert}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/power-menu.sh

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.background-alt}
