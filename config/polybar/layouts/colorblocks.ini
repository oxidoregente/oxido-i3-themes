[bar/top]
width = 100%
height = 28
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 1
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=11;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=13;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=18;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = xworkspaces colorblocks-sep cpu colorblocks-sep memory
modules-center = date
modules-right = nowplaying pulseaudio colorblocks-sep battery tray powermenu

[module/colorblocks-sep]
type = custom/text
format = <label>
label = " "
label-background = ${colors.background}

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
label-active = " %name% "
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 2
label-occupied = " %name% "
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = " %name% "
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = " %name% "
label-empty-foreground = ${colors.empty-ws}
label-empty-padding = 2

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
format-background = ${colors.background-alt}
format-padding = 2
label = "%percentage%%"
label-foreground = ${colors.foreground}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.yellow}
format-background = ${colors.background-alt}
format-padding = 2
label = "%percentage_used%%"
label-foreground = ${colors.foreground}

[module/date]
type = internal/date
interval = 1
format-background = ${colors.background-alt}
format-padding = 3
date = %I:%M %p
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-background = ${colors.background-alt}
format-volume-padding = 2
format-muted = <label-muted>
format-muted-background = ${colors.background-alt}
format-muted-padding = 2
label-volume = " %percentage%%"
label-volume-foreground = ${colors.foreground}
label-muted = "ﱝ MUTE"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt-widget.sh
interval = 1
signal = 10
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
click-left = /home/oxido/.config/themes/scripts/notify-battery-detail.sh
click-right = /home/oxido/.config/themes/scripts/cycle-power-profile.sh
[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/rofi-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 8
tray-background = ${colors.background-alt}

[module/nowplaying]
type = custom/script
exec = ~/.config/polybar/scripts/nowplaying.sh
tail = true
click-left = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh play-pause
click-right = /home/oxido/.config/polybar/scripts/playerctl-wrapper.sh next
format = <label>
label-background = ${colors.background-alt}
format-padding = 1
label = %output%
label-foreground = ${colors.foreground}
