[bar/top]
width = 100%
height = 30
radius = 0
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
padding-left = 0
padding-right = 0
module-margin = 0
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=12;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=11;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=20;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3
tray-background = ${colors.background-alt}

modules-left = xworkspaces
modules-center = date
modules-right = cpu memory pulseaudio battery powermenu tray

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-background = ${colors.primary}
format-padding = 1
label-active = %name%
label-active-foreground = ${colors.background}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %I:%M %p
date-alt = %d-%m-%Y %I:%M:%S %p
format-background = ${colors.background-alt}
format-padding = 2
label = %date%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
interval = 3
format-background = ${colors.background}
format-padding = 1
label = " %percentage%%"
label-foreground = ${colors.green}

[module/memory]
type = internal/memory
interval = 3
format-background = ${colors.background}
format-padding = 1
label = " %percentage_used%%"
label-foreground = ${colors.yellow}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-background = ${colors.background}
format-volume-padding = 1
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-background = ${colors.background}
format-muted-foreground = ${colors.alert}
format-muted-padding = 1
label-volume = " %percentage%%"
label-volume-foreground = ${colors.secondary}
bar-volume-width = 6
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.secondary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " 婢 MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = custom/script
exec = /home/oxido/.config/themes/scripts/batt_status.sh
interval = 5
format-background = ${colors.background}
format-padding = 1
label = "%output%"
click-left = rm /tmp/polybar_batt_state 2>/dev/null || touch /tmp/polybar_batt_state; polybar-msg action "#battery.module_exec"

[module/powermenu]
type = custom/text
format = " "
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/themes/scripts/power-menu.sh

[module/tray]
type = internal/tray
tray-spacing = 4
tray-background = ${colors.background-alt}
