[colors]
background = #1f1f28
background-alt = #57575d
bubble-ws = #363650
bubble-center = #364848
bubble-sys = #384858
foreground = #dcd7ba
primary = #7e9cd8
secondary = #6a9589
alert = #c34043
disabled = #54546d
green = #76946a
pink = #957fb8
yellow = #c0a36e

[bar/top]
bottom = false
width = 90%
height = 30
radius = 12
dpi = 96
offset-x = 5%
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 0
border-size = 3
border-color = ${colors.primary}
padding-left = 2
padding-right = 2
module-margin = 1
separator = ""
font-0 = "JetBrainsMono Nerd Font Mono:size=12;3"
font-1 = "JetBrainsMono Nerd Font Mono:size=14;4"
font-2 = "JetBrainsMono Nerd Font Mono:size=20;3"
cursor-click = pointer
enable-ipc = true
wm-restack = i3

modules-left = xworkspaces
modules-center = date
modules-right = dnd network cpu pulseaudio battery powermenu tray

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
format-padding = 1
label-active = %name%
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 2
label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/date]
type = internal/date
interval = 1
format-prefix = " "
format-prefix-foreground = ${colors.primary}
date = %I:%M %p
date-alt = %a %d-%m-%Y
label = %date%
label-foreground = ${colors.foreground}

[module/dnd]
type = custom/script
exec = /home/oxido/.config/themes/scripts/dnd-indicator.sh
interval = 5
format-padding = 1
label = %output%
click-left = /home/oxido/.config/themes/scripts/toggle-dnd.sh

[module/cpu]
type = internal/cpu
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage%%
label-foreground = ${colors.foreground}

[module/pulseaudio]
type = internal/pulseaudio
reverse-scroll = true
format-volume = <label-volume>
format-volume-foreground = ${colors.foreground}
format-muted = <label-muted>
format-muted-foreground = ${colors.alert}
label-volume-foreground = ${colors.primary}
label-volume = "%percentage%%"
bar-volume-width = 6
bar-volume-indicator = ●
bar-volume-indicator-foreground = ${colors.primary}
bar-volume-fill = ─
bar-volume-fill-foreground = ${colors.secondary}
bar-volume-empty = ─
bar-volume-empty-foreground = ${colors.disabled}
label-muted = " MUTED"
label-muted-foreground = ${colors.alert}
click-right = pavucontrol

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-charging-foreground = ${colors.green}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.foreground}
label-full = %percentage%%
label-full-foreground = ${colors.foreground}

ramp-capacity-0 = 
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = 
ramp-capacity-1-foreground = ${colors.yellow}
ramp-capacity-2 = 
ramp-capacity-2-foreground = ${colors.foreground}
ramp-capacity-3 = 
ramp-capacity-3-foreground = ${colors.foreground}
ramp-capacity-4 = 
ramp-capacity-4-foreground = ${colors.green}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-framerate = 750

[module/network]
type = internal/network
interface-type = wireless
interval = 3.0

format-connected = <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>

label-connected = %essid%
label-disconnected = Desconectado
label-disconnected-foreground = ${colors.disabled}

ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨

click-right = nm-connection-editor

[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.alert}
format-background = ${colors.background-alt}
format-padding = 2
click-left = /home/oxido/.config/eww/scripts/toggle-powermenu.sh

[module/tray]
type = internal/tray
tray-spacing = 6
tray-background = ${colors.background}
